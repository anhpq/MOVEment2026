name: Deploy Backend (ECS)

on:
  push:
    branches:
      - develop
      - master
    paths:
      - 'be/**'
      - '.github/workflows/be-deploy.yml'
  workflow_dispatch:

concurrency:
  group: be-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  HUAWEI_REGION: ap-southeast-3
  SWR_ORGANIZATION: movement
  IMAGE_NAME: movement-api
  DEPLOY_PATH: /opt/movement

jobs:
  build-and-push:
    name: Build image and push to SWR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Huawei Cloud SWR
        uses: huaweicloud/swr-login@v1
        with:
          region: ${{ env.HUAWEI_REGION }}
          access-key-id: ${{ secrets.HUAWEI_ACCESS_KEY }}
          access-key-secret: ${{ secrets.HUAWEI_SECRET_KEY }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: |
            swr.${{ env.HUAWEI_REGION }}.myhuaweicloud.com/${{ env.SWR_ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            swr.${{ env.HUAWEI_REGION }}.myhuaweicloud.com/${{ env.SWR_ORGANIZATION }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image reference
        id: image-meta
        run: |
          echo "image=swr.${HUAWEI_REGION}.myhuaweicloud.com/${SWR_ORGANIZATION}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          source: be/deploy/docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 2

      - name: Pull image and restart service
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          HUAWEI_REGION: ${{ env.HUAWEI_REGION }}
          HUAWEI_ACCESS_KEY: ${{ secrets.HUAWEI_ACCESS_KEY }}
          HUAWEI_SECRET_KEY: ${{ secrets.HUAWEI_SECRET_KEY }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          envs: IMAGE,DEPLOY_PATH,HUAWEI_REGION,HUAWEI_ACCESS_KEY,HUAWEI_SECRET_KEY
          script: |
            set -euo pipefail
            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            echo "${HUAWEI_SECRET_KEY}" | docker login \
              -u "${HUAWEI_REGION}@${HUAWEI_ACCESS_KEY}" \
              --password-stdin \
              "swr.${HUAWEI_REGION}.myhuaweicloud.com"

            export IMAGE="${IMAGE}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
