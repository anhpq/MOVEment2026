name: Deploy Backend (ECS)

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to deploy from the ECS checkout'
        required: true
        default: 'master'
      backup_confirmed:
        description: 'Type BACKUP_CONFIRMED after taking a Production database backup'
        required: true
      deploy_backend:
        description: 'Type deploy-backend to run Phase 1'
        required: true

concurrency:
  group: production-backend-deploy
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/movement/app
  APP_NAME: movement-api

jobs:
  deploy:
    name: Phase 1 - Backend, migrations, seed, verify
    runs-on: ubuntu-latest
    environment: production-backend

    steps:
      - name: Validate manual approval inputs
        env:
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
          BACKUP_CONFIRMED: ${{ github.event.inputs.backup_confirmed }}
          DEPLOY_BACKEND: ${{ github.event.inputs.deploy_backend }}
        run: |
          set -euo pipefail
          if [ "${BACKUP_CONFIRMED}" != "BACKUP_CONFIRMED" ]; then
            echo "Refusing backend deploy: confirm a fresh Production database backup first."
            exit 1
          fi
          if [ "${DEPLOY_BACKEND}" != "deploy-backend" ]; then
            echo "Refusing backend deploy: deploy_backend input must be exactly deploy-backend."
            exit 1
          fi
          if [ "${TARGET_BRANCH}" != "master" ]; then
            echo "Refusing backend deploy: Production deploy branch must be master."
            exit 1
          fi

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.target_branch }}
          GIT_REPO_URL: git@github.com:${{ github.repository }}.git
          APP_NAME: ${{ env.APP_NAME }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH,DEPLOY_BRANCH,GIT_REPO_URL,APP_NAME
          script: |
            set -euo pipefail

            # Handle three cases without deleting the tree (preserves be/.env):
            # 1) no .git + non-empty dir -> init/fetch/checkout in place
            # 2) no .git + missing/empty dir -> clone
            # 3) .git present -> fetch + hard reset to DEPLOY_BRANCH
            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              if [ -d "${DEPLOY_PATH}" ] && [ -n "$(ls -A "${DEPLOY_PATH}" 2>/dev/null || true)" ]; then
                cd "${DEPLOY_PATH}"
                git init
                git remote add origin "${GIT_REPO_URL}" 2>/dev/null \
                  || git remote set-url origin "${GIT_REPO_URL}"
                git fetch --depth=1 origin "${DEPLOY_BRANCH}"
                git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
              else
                mkdir -p "$(dirname "${DEPLOY_PATH}")"
                git clone --branch "${DEPLOY_BRANCH}" "${GIT_REPO_URL}" "${DEPLOY_PATH}"
              fi
            else
              cd "${DEPLOY_PATH}"
              git fetch origin
              git checkout "${DEPLOY_BRANCH}"
              git reset --hard "origin/${DEPLOY_BRANCH}"
            fi

            if [ ! -f "${DEPLOY_PATH}/be/.env" ]; then
              echo "Missing ${DEPLOY_PATH}/be/.env on the ECS host."
              echo "Create it from be/deploy/.env.example with production DATABASE_URL, JWT_SECRET, SCORING_CODE, CORS_ORIGIN."
              exit 1
            fi

            export DEPLOY_PATH DEPLOY_BRANCH GIT_REPO_URL APP_NAME
            bash "${DEPLOY_PATH}/be/deploy/deploy.sh"

            curl -fsS "http://127.0.0.1:8080/api/docs" >/dev/null
