name: Deploy Frontend (Nginx)

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to deploy from the ECS checkout'
        required: true
        default: 'master'
      deploy_frontend:
        description: 'Type deploy-frontend to run Phase 2'
        required: true

concurrency:
  group: production-frontend-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/movement/app
  FRONTEND_ROOT: /var/www/movement/current
  NGINX_SITE_NAME: heroes.nalth.top

jobs:
  deploy:
    name: Phase 2 - Frontend and Nginx
    runs-on: ubuntu-latest
    environment: production-frontend

    steps:
      - name: Validate manual approval inputs
        env:
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
          DEPLOY_FRONTEND: ${{ github.event.inputs.deploy_frontend }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_FRONTEND}" != "deploy-frontend" ]; then
            echo "Refusing frontend deploy: deploy_frontend input must be exactly deploy-frontend."
            exit 1
          fi
          if [ "${TARGET_BRANCH}" != "master" ]; then
            echo "Refusing frontend deploy: Production deploy branch must be master."
            exit 1
          fi

      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.target_branch }}
          GIT_REPO_URL: git@github.com:${{ github.repository }}.git
          FRONTEND_ROOT: ${{ env.FRONTEND_ROOT }}
          NGINX_SITE_NAME: ${{ env.NGINX_SITE_NAME }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH,DEPLOY_BRANCH,GIT_REPO_URL,FRONTEND_ROOT,NGINX_SITE_NAME
          script: |
            set -euo pipefail

            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              if [ -d "${DEPLOY_PATH}" ] && [ -n "$(ls -A "${DEPLOY_PATH}" 2>/dev/null || true)" ]; then
                cd "${DEPLOY_PATH}"
                git init
                git remote add origin "${GIT_REPO_URL}" 2>/dev/null \
                  || git remote set-url origin "${GIT_REPO_URL}"
                git fetch --depth=1 origin "${DEPLOY_BRANCH}"
                git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
              else
                mkdir -p "$(dirname "${DEPLOY_PATH}")"
                git clone --branch "${DEPLOY_BRANCH}" "${GIT_REPO_URL}" "${DEPLOY_PATH}"
              fi
            else
              cd "${DEPLOY_PATH}"
              git fetch origin
              git checkout "${DEPLOY_BRANCH}"
              git reset --hard "origin/${DEPLOY_BRANCH}"
            fi

            cd "${DEPLOY_PATH}/fe"
            unset VITE_API_BASE_URL
            npm ci
            npm run build

            sudo mkdir -p "${FRONTEND_ROOT}"
            sudo rsync -a --delete dist/ "${FRONTEND_ROOT}/"
            sudo cp "${DEPLOY_PATH}/deploy/nginx/movement.conf" "/etc/nginx/sites-available/${NGINX_SITE_NAME}"
            sudo ln -sfn "/etc/nginx/sites-available/${NGINX_SITE_NAME}" "/etc/nginx/sites-enabled/${NGINX_SITE_NAME}"
            sudo nginx -t
            sudo systemctl reload nginx

            curl -fsS "https://${NGINX_SITE_NAME}/" >/dev/null
            curl -fsS "https://${NGINX_SITE_NAME}/api/docs" >/dev/null
            curl -fsS "https://${NGINX_SITE_NAME}/qr-login" >/dev/null
            curl -fsS "https://${NGINX_SITE_NAME}/qr-login?token=placeholder" >/dev/null

            missing_status="$(curl -sS -o /dev/null -w "%{http_code}" "https://${NGINX_SITE_NAME}/assets/missing.js")"
            if [ "${missing_status}" != "404" ]; then
              echo "Expected missing frontend asset to return 404, got ${missing_status}."
              exit 1
            fi
