name: Deploy Frontend (OBS)

on:
  push:
    branches:
      - develop
      - master
    paths:
      - 'fe/**'
      - '.github/workflows/fe-deploy.yml'
  workflow_dispatch:

concurrency:
  group: fe-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  HUAWEI_REGION: ap-southeast-3
  OBS_BUCKET: movement
  NODE_VERSION: '20'

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate API base URL
        run: |
          if [ -z "${VITE_API_BASE_URL:-}" ]; then
            echo "VITE_API_BASE_URL repository variable is missing or empty."
            echo "This workflow deploys directly to OBS, which cannot reverse proxy same-origin /api requests."
            echo "Set VITE_API_BASE_URL to an HTTPS API origin, or deploy the frontend behind deploy/nginx/movement.conf instead."
            exit 1
          fi

          case "${VITE_API_BASE_URL}" in
            *obs-website*|*obs.*myhuaweicloud.com*)
              echo "VITE_API_BASE_URL points at OBS/static hosting, not the backend API."
              echo "Current value: ${VITE_API_BASE_URL}"
              exit 1
              ;;
          esac

          case "${VITE_API_BASE_URL}" in
            https://*)
              ;;
            *)
              echo "VITE_API_BASE_URL must be HTTPS when set for deployed frontend builds."
              echo "Use an HTTPS API origin for OBS static hosting, or serve /api through the production reverse proxy."
              exit 1
              ;;
          esac
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Build production bundle
        run: npm run build:prod
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-dist
          path: fe/dist
          retention-days: 1

  deploy:
    name: Deploy to OBS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: fe-dist
          path: dist

      - name: Install obsutil
        run: |
          wget -q https://obs-community-intl.obs.ap-southeast-1.myhuaweicloud.com/obsutil/current/obsutil_linux_amd64.tar.gz
          tar -xzf obsutil_linux_amd64.tar.gz
          OBSUTIL_BIN="$(find . -maxdepth 2 -name obsutil -type f | head -1)"
          chmod 755 "${OBSUTIL_BIN}"
          echo "OBSUTIL_BIN=${OBSUTIL_BIN}" >> "${GITHUB_ENV}"

      - name: Sync dist to OBS bucket
        run: |
          "${OBSUTIL_BIN}" config -i="${{ secrets.HUAWEI_ACCESS_KEY }}" \
            -k="${{ secrets.HUAWEI_SECRET_KEY }}" \
            -e="https://obs.${{ env.HUAWEI_REGION }}.myhuaweicloud.com"

          "${OBSUTIL_BIN}" sync dist/ "obs://${{ env.OBS_BUCKET }}/" \
            -acl=public-read

          # SPA entry point: always fetch fresh so new JS/CSS hashes are picked up
          "${OBSUTIL_BIN}" cp dist/index.html "obs://${{ env.OBS_BUCKET }}/index.html" \
            -acl=public-read -meta=Cache-Control:no-cache,no-store,must-revalidate

      - name: Deployment summary
        run: |
          echo "Frontend deployed to obs://${{ env.OBS_BUCKET }}/"
          echo "Region: ${{ env.HUAWEI_REGION }}"
          echo "Ensure OBS static website hosting has index.html as both index and error document."
