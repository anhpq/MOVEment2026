# MOVEment 2026 production reverse proxy for heroes.nalth.top.
#
# Build the frontend without VITE_API_BASE_URL so browser API calls stay relative:
#   fetch("/api/...")
#
# Expected local services/files:
# - Nest API listens on 127.0.0.1:8080
# - Frontend dist is published to /var/www/movement/current

upstream movement_api {
  server 127.0.0.1:8080;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name heroes.nalth.top;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name heroes.nalth.top;

  ssl_certificate /etc/letsencrypt/live/heroes.nalth.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/heroes.nalth.top/privkey.pem;

  root /var/www/movement/current;
  index index.html;

  # API requests must stay on the backend and must never fall through to index.html.
  location ^~ /api/ {
    proxy_pass http://movement_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Static assets are real files. Missing assets should be 404, not index.html.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # BrowserRouter SPA fallback: physical files win; unknown frontend routes load index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
